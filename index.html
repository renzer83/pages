<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta da Sexta-Feira 🍕🍔</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Fonte divertida do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            overflow-x: hidden;
        }
        h1, .winner-text {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
        }
        
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
        }

        /* O ponteiro da roleta */
        .pointer {
            position: absolute;
            top: 50%;
            right: -15px;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 30px solid #ff3366;
            z-index: 10;
            filter: drop-shadow(-2px 2px 5px rgba(0,0,0,0.5));
        }

        /* Animação e estilos do modal de vitória */
        #winnerModal {
            display: none;
            backdrop-filter: blur(10px);
        }
        
        .winner-text {
            font-size: 5rem;
            background: -webkit-linear-gradient(45deg, #ffde00, #ff3366, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(255, 255, 255, 0.3);
            animation: winnerPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatText 3s ease-in-out infinite alternate;
        }

        @keyframes winnerPop {
            0% { transform: scale(0.1) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes floatText {
            from { transform: translateY(0px) scale(1); }
            to { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px #4facfe, 0 0 30px #4facfe; }
            50% { box-shadow: 0 0 30px #ff3366, 0 0 50px #ff3366; }
            100% { box-shadow: 0 0 15px #4facfe, 0 0 30px #4facfe; }
        }

        .btn-spin {
            animation: pulseGlow 2s infinite;
            transition: all 0.3s ease;
        }
        
        .btn-spin:active {
            transform: scale(0.95);
        }
        
        /* Raios de fundo do modal de vitória */
        .sunburst {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vw;
            height: 200vw;
            margin-left: -100vw;
            margin-top: -100vw;
            background: repeating-conic-gradient(
                from 0deg,
                rgba(255, 255, 255, 0.1) 0deg 15deg,
                transparent 15deg 30deg
            );
            animation: rotateSunburst 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotateSunburst {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Efeitos Sonoros (Usando URLs de CDN públicas e seguras) -->
    <!-- Drumroll (rufar de tambores) -->
    <audio id="audioDrumroll" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
    <!-- Som de Vitória -->
    <audio id="audioWin" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div class="text-center mb-8">
        <h1 class="text-6xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-500 drop-shadow-lg mb-2">
            O QUE COMER HOJE?
        </h1>
        <p class="text-gray-300 text-lg">A roleta decide! (Itens não se repetem em semanas seguidas)</p>
        <p id="lastWeekInfo" class="text-sm text-pink-400 mt-2 font-bold hidden"></p>
    </div>

    <div class="wheel-container relative">
        <div class="pointer"></div>
        <canvas id="rouletteCanvas" width="400" height="400" class="w-full h-auto rounded-full bg-gray-900 border-4 border-white shadow-2xl"></canvas>
    </div>

    <button id="spinBtn" class="btn-spin mt-10 px-12 py-4 bg-gradient-to-r from-green-400 to-blue-500 rounded-full text-white font-bold text-2xl uppercase tracking-wider hover:from-green-500 hover:to-blue-600 focus:outline-none">
        Girar a Roleta!
    </button>
    
    <button id="resetHistory" class="mt-8 text-xs text-gray-500 hover:text-white underline opacity-50">
        Resetar histórico (Permitir todos os itens)
    </button>

    <!-- Modal de Vitória Exagerado -->
    <div id="winnerModal" class="fixed inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center z-50 overflow-hidden">
        <div class="sunburst"></div>
        <h2 class="text-3xl text-white font-bold mb-4 z-10">E o jantar de hoje é...</h2>
        <div id="winnerText" class="winner-text text-center px-4 z-10">PIZZA!</div>
        <button id="closeModal" class="mt-12 px-8 py-3 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition z-10 text-xl shadow-lg">
            Fechou! Partiu comer! 🚀
        </button>
    </div>

    <script>
        // --- 1. CONFIGURAÇÕES E DADOS ---
        const todosOsItens = [
            "Mac Donalds", 
            "Burger King", 
            "Pizza", 
            "Hamburgueria", 
            "Comida Japonesa", 
            "Carne e Batata", 
            "Carne Salada", 
            "Frutas", 
            "Restaurante", 
            "Hotdog"
        ];

        // Cores vibrantes para a roleta
        const cores = [
            '#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93',
            '#FF9F1C', '#E01A4F', '#06D6A0', '#118AB2', '#073B4C'
        ];

        let itensDisponiveis = [];
        let itemSextaPassada = localStorage.getItem('ultimoItemComido');

        // Lógica de "uma vez a cada duas semanas" (filtra o último item escolhido)
        if (itemSextaPassada && todosOsItens.includes(itemSextaPassada)) {
            itensDisponiveis = todosOsItens.filter(item => item !== itemSextaPassada);
            const info = document.getElementById('lastWeekInfo');
            info.textContent = `🚫 Semana passada foi: ${itemSextaPassada} (Removido da roleta de hoje)`;
            info.classList.remove('hidden');
        } else {
            itensDisponiveis = [...todosOsItens];
        }

        // --- 2. CONFIGURAÇÃO DO CANVAS ---
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const centroX = canvas.width / 2;
        const centroY = canvas.height / 2;
        const raio = Math.min(centroX, centroY);
        
        let anguloAtual = 0; // em radianos
        let isSpinning = false;

        // --- 3. DESENHAR A ROLETA ---
        function desenharRoleta() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const fatiaAngulo = (2 * Math.PI) / itensDisponiveis.length;

            for (let i = 0; i < itensDisponiveis.length; i++) {
                const anguloInicio = anguloAtual + (i * fatiaAngulo);
                const anguloFim = anguloInicio + fatiaAngulo;

                // Desenha a fatia (triângulo)
                ctx.beginPath();
                ctx.moveTo(centroX, centroY);
                ctx.arc(centroX, centroY, raio, anguloInicio, anguloFim);
                ctx.fillStyle = cores[i % cores.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                // Adiciona o texto
                ctx.save();
                ctx.translate(centroX, centroY);
                // Rotaciona para o meio da fatia
                ctx.rotate(anguloInicio + (fatiaAngulo / 2));
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Poppins';
                // Sombra no texto para melhor leitura
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                // Desenha o texto perto da borda
                ctx.fillText(itensDisponiveis[i], raio - 20, 0);
                ctx.restore();
            }
            
            // Círculo central da roleta
            ctx.beginPath();
            ctx.arc(centroX, centroY, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        // Desenha a roleta no carregamento
        desenharRoleta();

        // --- 4. LÓGICA DE GIRO (ANIMAÇÃO E MATEMÁTICA) ---
        // Função de Easing (Suavização): cubic ease-out para um final bem dramático
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        document.getElementById('spinBtn').addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            // Prepara Áudios
            const audioDrumroll = document.getElementById('audioDrumroll');
            const audioWin = document.getElementById('audioWin');
            audioDrumroll.currentTime = 0;
            audioDrumroll.play().catch(e => console.log("Áudio bloqueado pelo navegador", e));

            const duracaoGiro = 8000; // 8 segundos de drama
            const anguloInicialGiro = anguloAtual;
            
            // Define quantas voltas completas dará (ex: de 10 a 15 voltas) + um offset aleatório
            const voltasExtras = Math.random() * 5 + 10; 
            const radianosTotais = voltasExtras * 2 * Math.PI;
            const anguloAlvo = anguloInicialGiro + radianosTotais;

            let tempoInicio = null;

            function animarGiro(tempoAtual) {
                if (!tempoInicio) tempoInicio = tempoAtual;
                const tempoDecorrido = tempoAtual - tempoInicio;
                
                // Progresso de 0 a 1
                let progresso = Math.min(tempoDecorrido / duracaoGiro, 1);
                
                // Aplica a suavização (easing)
                const progressoSuavizado = easeOutCubic(progresso);

                anguloAtual = anguloInicialGiro + (radianosTotais * progressoSuavizado);
                desenharRoleta();

                if (progresso < 1) {
                    requestAnimationFrame(animarGiro);
                } else {
                    finalizarGiro();
                }
            }

            requestAnimationFrame(animarGiro);
        });

        // --- 5. FINALIZAÇÃO E EFEITOS EXAGERADOS ---
        function finalizarGiro() {
            isSpinning = false;
            
            // Para tambores e toca música de vitória
            const audioDrumroll = document.getElementById('audioDrumroll');
            const audioWin = document.getElementById('audioWin');
            audioDrumroll.pause();
            audioWin.currentTime = 0;
            audioWin.play().catch(e => console.log("Áudio bloqueado", e));

            // Calcular qual item ganhou
            // Como o ponteiro está na direita (0 radianos), 
            // precisamos ver qual fatia está atravessando o ângulo 0 ou (2 * Math.PI).
            // A roleta girou no sentido horário (ângulo positivo).
            // Normaliza o ângulo atual para ficar entre 0 e 2PI
            const anguloNormalizado = anguloAtual % (2 * Math.PI);
            const fatiaAngulo = (2 * Math.PI) / itensDisponiveis.length;
            
            // Como o canvas desenha a partir de 'anguloAtual', a fatia 0 começa em 'anguloNormalizado'.
            // Precisamos encontrar 'i' tal que: (anguloNormalizado + i * fatiaAngulo) % 2PI contemple o ângulo 0 (onde está o ponteiro).
            // A fórmula matemática mais fácil:
            let indexGanhador = Math.floor(((2 * Math.PI) - anguloNormalizado) / fatiaAngulo) % itensDisponiveis.length;
            
            // Por causa de possíveis arredondamentos em JS se o ângulo for exatamente 0:
            if (indexGanhador < 0) indexGanhador += itensDisponiveis.length;

            const comidaEscolhida = itensDisponiveis[indexGanhador];

            // Salvar para a próxima semana
            localStorage.setItem('ultimoItemComido', comidaEscolhida);

            // Mostrar resultado com EXAGERO
            mostrarResultadoExagerado(comidaEscolhida);
        }

        function mostrarResultadoExagerado(vencedor) {
            const modal = document.getElementById('winnerModal');
            const textoModal = document.getElementById('winnerText');
            
            textoModal.textContent = vencedor.toUpperCase() + "!!!";
            modal.style.display = 'flex';

            // CHUVA DE CONFETES EXAGERADA!
            dispararConfetes();
        }

        function dispararConfetes() {
            var duration = 4000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 45, spread: 360, ticks: 100, zIndex: 60 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 70 * (timeLeft / duration);
                
                // Canhões das laterais
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                // Canhão do meio
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 0.5, y: 0.8 }, spread: 100, startVelocity: 60 }));
            }, 250);
        }

        // --- 6. FECHAR MODAL E RESETAR ---
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('winnerModal').style.display = 'none';
            // Recarrega a página para atualizar o filtro caso o usuário queira girar de novo (embora seja pra sexta que vem)
            window.location.reload();
        });

        document.getElementById('resetHistory').addEventListener('click', () => {
            localStorage.removeItem('ultimoItemComido');
            alert("Histórico apagado! Todas as opções estão de volta na roleta.");
            window.location.reload();
        });

    </script>
</body>
</html>
